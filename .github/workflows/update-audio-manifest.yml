name: Update Audio Manifest

on:
  push:
    branches:
      - main
    paths:
      - 'sounds/**'
  workflow_dispatch:  # Allows manual triggering

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history for all branches and tags

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Generate audio manifest (minified JSON)
        run: |
          python - << EOF
          import os
          import json
          import hashlib
          from pathlib import Path

          def calculate_hash(file_path):
              sha256_hash = hashlib.sha256()
              with open(file_path, "rb") as f:
                  for byte_block in iter(lambda: f.read(4096), b""):
                      sha256_hash.update(byte_block)
              return sha256_hash.hexdigest()

          def generate_manifest():
              sounds_dir = Path('sounds')
              manifest = {}

              if not sounds_dir.exists():
                  print(f"Warning: {sounds_dir} does not exist")
                  return {}

              for file_path in sounds_dir.rglob('*.ogg'):
                  file_size = os.path.getsize(file_path)
                  file_hash = calculate_hash(file_path)
                  key = file_path.stem
                  manifest[key] = {"size": file_size, "hash": file_hash}

              return manifest

          manifest = generate_manifest()
          with open('audio_manifest.json', 'w') as f:
              json.dump(manifest, f, separators=(',', ':'), sort_keys=True)

          print("Generated minified audio_manifest.json")
          EOF

      - name: Upload manifest to Azure Blob Storage
        env:
          BLOB_SAS_URL: ${{ secrets.BLOB_SAS_URL }}
        run: |
          containerUrl="${BLOB_SAS_URL%%\?*}"
          sasToken="${BLOB_SAS_URL#*\?}"
          azcopy copy "audio_manifest.json" "${containerUrl}/audio_manifest.json?${sasToken}" --overwrite=true
